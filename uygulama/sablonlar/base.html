<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f766e" />
  <title>{% block title %}Diyabet Risk Tahmini{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('statik', path='css/stiller.css') }}" />
</head>
<body class="{% block body_class %}{% endblock %}">

  <header class="site-bar">
    <a class="brand" href="{{ url_for('ana_sayfa') }}">
      <img class="brand-logo" src="{{ url_for('statik', path='img/diyabet_glikoz_logo.png') }}" alt="Diyabet Risk Logo" />
      <span class="brand-text">
        <span class="brand-name">Diyabet Risk Tahmini</span>
        <span class="brand-sub">Kadın bireylere yönelik klinik prototip</span>
      </span>
    </a>
    <nav class="brand-meta" aria-label="Geliştiriciler">
      <span class="brand-authors">Berat Kaan SEVEN &nbsp;&middot;&nbsp; Berfin KÜLEKÇİ</span>
    </nav>
  </header>

  <main class="page">
    {% block icerik %}{% endblock %}
  </main>

  <footer class="site-foot">
    <div class="foot-inner">
      <img class="foot-logo" src="{{ url_for('statik', path='img/diyabet_glikoz_logo.png') }}" alt="Logo" />
      <div class="foot-copy">
        <span class="foot-title">Yasal Uyarı</span>
        <p>Bu uygulama istatistiksel bir tahmin sunar. Sonuçlar kesin tanı değildir, tıbbi değerlendirme yerine geçmez.</p>
      </div>
    </div>
  </footer>

  <script src="{{ url_for('statik', path='js/uygulama.js') }}"></script>
</body>
</html>
