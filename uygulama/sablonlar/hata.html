{% extends "base.html" %}

{% block title %}Diyabet Risk Tahmini | Hata{% endblock %}
{% block body_class %}is-error{% endblock %}

{% block icerik %}
<section class="error-card">
  <div class="error-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
  </div>
  <h1>İşlem sırasında bir sorun oluştu</h1>
  <p class="error-msg">{{ hata_mesaji or "Beklenmeyen bir hata oluştu. Lütfen tekrar deneyin." }}</p>
  <a class="btn btn-primary" href="{{ url_for('ana_sayfa') }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span>Ana Sayfaya Dön</span>
  </a>
</section>
{% endblock %}
